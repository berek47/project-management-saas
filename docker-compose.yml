services:
  postgres:
    image: postgres:16-alpine
    container_name: project-management-saas-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: project_management_saas
      POSTGRES_USER: bereket
      POSTGRES_PASSWORD: bereket123
    volumes:
      - project_management_saas_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bereket -d project_management_saas"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://bereket:bereket123@postgres:5432/project_management_saas
      DIRECT_URL: postgresql://bereket:bereket123@postgres:5432/project_management_saas
      CLIENT_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  project_management_saas_postgres:
